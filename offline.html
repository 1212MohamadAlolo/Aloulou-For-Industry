<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2d6a68">
<title>لا يوجد اتصال</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f3f7f6;color:#172826;font-family:"Cairo",Tahoma,Arial,sans-serif}
main{width:min(520px,100%);padding:36px 28px;border:1px solid #dbe7e3;border-radius:24px;background:#fff;text-align:center;box-shadow:0 18px 55px rgba(29,67,63,.1)}
img{width:min(280px,80%);height:auto;margin:0 auto 24px}
h1{margin:0 0 12px;font-size:1.7rem}
p{margin:0 0 24px;color:#667773}
.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
button{min-height:46px;padding:0 20px;border:0;border-radius:12px;background:#2d6a68;color:#fff;font:800 .85rem inherit;cursor:pointer}
button.secondary{background:#e8f2ef;color:#1f4f4d}
html[lang="en"] body,html[lang="en"] button{font-family:"Inter",Arial,sans-serif}
</style>
</head>
<body>
<main>
<img src="assets/images/brand/aloulou-logo-full.webp" alt="علولو للصناعة">
<h1>لا يوجد اتصال بالإنترنت</h1>
<p>أعد المحاولة بعد عودة الاتصال.</p>
<div class="actions">
<button onclick="location.reload()">إعادة المحاولة</button>
<button class="secondary" data-language-toggle type="button">EN</button>
</div>
</main>
<script src="assets/js/i18n.js?v=31.0.0"></script>
</body>
</html>
